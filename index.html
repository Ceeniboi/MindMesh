<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>MindMesh Prototype</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <!-- Controls (top-left) -->
  <div id="controls">
    <input id="topicInput" type="text" placeholder="Enter topic..." />
    <button id="generateBtn">Generate Map</button>
  </div>

  <!-- Graph container (full-viewport) -->
  <div id="graph"></div>

  <!-- Info card (keep outside #graph so it isn’t wiped by WebGL) -->
  <aside id="infoCard" style="display:none;">
    <button id="closeCard">✕</button>
    <h3 id="cardTitle">Title</h3>
    <p id="cardSummary">Summary</p>
    <div id="cardSources"></div>
  </aside>

  <script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
  <script src="https://unpkg.com/3d-force-graph@1.73.4/dist/3d-force-graph.min.js"></script>
  <script src="main.js"></script>
</body>
</html>
